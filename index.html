<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Card for Sister</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-image">
            <!-- You can replace this URL with a photo of you two or her kids -->
            <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&q=80&w=500" alt="Flowers">
        </div>
        <div class="card-content">
            <h2>To My Amazing Sister</h2>
            <p>Happy Mother’s Day! Watching you raise your little ones with such heart and grace is a gift. You're not just a great sister, you're an incredible mom.</p>
            <div class="heart">❤️</div>
        </div>
    </div>
</body>
</html>
